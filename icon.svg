<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background hijau -->
  <rect width="512" height="512" fill="#4CAF50" rx="64"/>
  
  <!-- Kalender putih -->
  <rect x="100" y="140" width="312" height="280" fill="white" rx="20"/>
  
  <!-- Header kalender (hijau tua) -->
  <rect x="100" y="140" width="312" height="60" fill="#2E7D32" rx="20"/>
  <rect x="100" y="180" width="312" height="20" fill="#2E7D32"/>
  
  <!-- Garis-garis kalender -->
  <line x1="130" y1="240" x2="382" y2="240" stroke="#E0E0E0" stroke-width="4"/>
  <line x1="130" y1="290" x2="382" y2="290" stroke="#E0E0E0" stroke-width="4"/>
  <line x1="130" y1="340" x2="382" y2="340" stroke="#E0E0E0" stroke-width="4"/>
  <line x1="130" y1="390" x2="382" y2="390" stroke="#E0E0E0" stroke-width="4"/>
  
  <!-- Checkmark hijau -->
  <path d="M 200 280 L 240 320 L 312 240" stroke="#4CAF50" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Lingkaran pengikat kalender -->
  <circle cx="180" cy="140" r="15" fill="#2E7D32"/>
  <circle cx="332" cy="140" r="15" fill="#2E7D32"/>
</svg>
