<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Kegiatan Harian</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <div class="card-title">
            <h1><i class="ri-calendar-check-line"></i> Catatan Kegiatan Harian</h1>
        </div>

        <div class="card-table">
            <div class="table-scroll-wrapper" id="tableScrollWrapper">
            <table id="activityTable">
                <thead>
                    <tr>
                        <th class="no-col">No</th>
                        <th class="date-col">Tanggal</th>
                        <th class="time-col">Jam</th>
                        <th class="kegiatan-col">Kegiatan</th>
                        <th class="tag-col">Tag</th>
                        <th class="waktu-col">Waktu Terpakai</th>
                        <th class="keterangan-col">Keterangan</th>
                        <th style="width:40px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        </div>

        <div class="card-buttons">
            <button class="btn btn-tambah" onclick="addRow()">
                <i class="ri-add-line"></i> Tambah
            </button>
            <button class="btn" style="background-color: #48bb78;" onclick="startWizardForm()">
                <i class="ri-survey-line"></i> Isi via Form
            </button>
            <button class="btn btn-simpan" onclick="saveData()">
                <i class="ri-save-line"></i> Simpan
            </button>
            <button class="btn btn-hapus" onclick="deleteAll()">
                <i class="ri-delete-bin-line"></i> Hapus Semua
            </button>
        </div>
    </div>

    <!-- Date Picker Modal -->
    <div class="modal-overlay" id="dateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="ri-calendar-line"></i> Pilih Tanggal</h3>
                <button class="modal-close" onclick="closeDateModal()">×</button>
            </div>
            <div class="calendar-nav">
                <button onclick="prevMonth()"><i class="ri-arrow-left-s-line"></i></button>
                <span id="calendarMonthYear"></span>
                <button onclick="nextMonth()"><i class="ri-arrow-right-s-line"></i></button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <button class="btn-confirm-date" onclick="confirmDate()">Konfirmasi Tanggal</button>
        </div>
    </div>

    <!-- Analog Time Picker Modal -->
    <div class="modal-overlay" id="timeModal">
        <div class="time-picker-modal">
            <div class="tp-header">
                <div class="tp-mode-label" id="tpModeLabel">PILIH JAM</div>
                <div class="tp-digital-display">
                    <span class="tp-digital-part active" id="tpHour" onclick="switchClockMode('hour')">00</span>
                    <span class="tp-digital-sep">:</span>
                    <span class="tp-digital-part" id="tpMinute" onclick="switchClockMode('minute')">00</span>
                </div>
            </div>
            <div class="tp-body">
                <div class="clock-face" id="clockFace">
                    <div class="clock-center-dot"></div>
                    <div class="clock-line" id="clockLine"></div>
                </div>
            </div>
            <div class="tp-footer">
                <button class="tp-btn-icon" title="Keyboard input">
                    <i class="ri-keyboard-line"></i>
                </button>
                <button class="tp-btn-cancel" onclick="closeTimeModal()">BATAL</button>
                <button class="tp-btn-confirm" onclick="confirmTime()">✓ OKE</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="overlay" id="wizardOverlay" style="display: none; z-index: 1000;">
        <div class="clock-panel wizard-panel">
            <div class="clock-header">
                <div class="clock-header-label" id="wizardTitle">KEGIATAN</div>
            </div>
            <div class="wizard-body">
                <div id="wizardStepKegiatan" style="display: none;">
                    <input type="text" id="wizKegiatan" class="text-input" placeholder="Apa yang kamu lakukan?" onkeydown="if(event.key==='Enter') showWizardStep('tag')" autocomplete="off">
                    <button class="clock-ok" style="width: 100%; margin-top: 20px;" onclick="showWizardStep('tag')">LANJUT</button>
                </div>
                <div id="wizardStepTag" style="display: none;">
                    <select id="wizTag" class="tag-select tag-input" onchange="showWizardStep('keterangan')">
                        <option value="">-- Pilih Tag --</option>
                        <option value="shalat">🕌 Shalat</option>
                        <option value="makan">🍽️ Makan</option>
                        <option value="baca quran">📖 Baca Quran</option>
                        <option value="belajar">📚 Belajar</option>
                        <option value="tidur">😴 Tidur</option>
                        <option value="olahraga">🏃 Olahraga</option>
                        <option value="lainnya">📌 Lainnya</option>
                    </select>
                </div>
                <div id="wizardStepKeterangan" style="display: none;">
                    <input type="text" id="wizKeterangan" class="text-input" placeholder="Keterangan tambahan..." onkeydown="if(event.key==='Enter') finishWizard()" autocomplete="off">
                    <button class="clock-ok" style="width: 100%; margin-top: 20px;" onclick="finishWizard()">SIMPAN DATA</button>
                </div>
            </div>
            <div class="clock-btn-row">
                <button class="clock-cancel" onclick="cancelWizard()">BATAL</button>
            </div>
        </div>
    </div>

    <div style="display:none;">
        <input type="text" id="wizDateDummy" onclick="openDatePicker(this)">
        <input type="text" id="wizTimeDummy" onclick="openTimePicker(this)">
    </div>

    <script src="script.js"></script>
</body>
</html>
